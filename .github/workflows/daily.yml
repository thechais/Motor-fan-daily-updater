name: Run Daily MotorFan Update

on:
  schedule:
    - cron: '0 23 * * *' # 23:00 UTC translates exactly to 7:00 AM Singapore Time (SGT)
  workflow_dispatch: # Allows you to also run it manually anytime

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install tools
      run: pip install feedparser requests beautifulsoup4

    - name: Run the updater script
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python updater.py

    - name: Commit and save the new text file
      run: |
        git config --global user.name 'Automated Bot'
        git config --global user.email 'bot@github.com'
        git add archive/
        git commit -m "Add daily MotorFan text update" || exit 0
        git push

